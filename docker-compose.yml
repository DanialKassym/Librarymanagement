version: '3.9'

services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: javalab
      POSTGRES_USER: userlab
      POSTGRES_PASSWORD: user1

    ports:
      - "5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy